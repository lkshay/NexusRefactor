<text x="486" y="338" class="mono" font-size="9.5" fill="#9a9994">dense list + sparse list</text>
<line x1="778" y1="345" x2="798" y2="345" stroke="#b3b1a8" stroke-width="1.5" marker-end="url(#a2)"/>

<rect x="324" y="424" width="454" height="86" rx="8" fill="#f5f4f0" stroke="#e6e4de"/>
<text x="342" y="448" font-size="12.5" font-weight="500" fill="#262624">RRF — reciprocal rank fusion</text>
<text x="342" y="474" class="mono" font-size="13" fill="#3f6cc4">score(d) = Σ  1 / ( k + rank(d) )     ( k ≈ 60 )</text>
<text x="342" y="497" font-size="10" fill="#6b6a66">merges bm25 (exact field-name hit) + dense (semantic) by RANK — no score scaling</text>
</svg>
