<svg viewBox="0 0 900 540" width="900" height="540" xmlns="http://www.w3.org/2000/svg" role="img">
<title>hybrid retrieval and reciprocal rank fusion</title>
<desc>Two paths share one Qdrant collection. The index path (run at setup, before the agent): repo Python files are chunked by AST into functions and classes, each chunk is embedded twice — a dense bge-small 384-dimension vector and a sparse bm25 vector — and upserted as one Qdrant point carrying both named vectors plus a payload of repo, path, symbol, and code. The query path (inside the search node, per changed field): the field name is embedded with the same two models, Qdrant is searched twice with a repo filter, and the two ranked lists are merged by reciprocal rank fusion, score of a document equals the sum over lists of one over k plus its rank, with k about 60, yielding the top-k candidate sites. RRF merges the lexical bm25 match and the semantic dense match by rank, so no score normalization is needed.</desc>
<style>
 text { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
 .serif { font-family: Georgia, 'Times New Roman', serif; }
 .mono { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; }
</style>
<defs>
