<text x="167" y="600" font-size="11" fill="#3f6cc4" transform="rotate(-90 167 600)">LangGraph agent · StateGraph(RefactorState)</text>

<rect x="205" y="82" width="285" height="50" rx="8" fill="#f5f4f0" stroke="#e6e4de"/>
<text x="347" y="102" text-anchor="middle" font-size="13" font-weight="500" fill="#262624">trigger</text>
<text x="347" y="119" text-anchor="middle" font-size="10.5" fill="#6b6a66">webhook (HMAC · ack · clone)   or   nexus resolve</text>

<rect x="205" y="150" width="285" height="64" rx="8" fill="#f5f4f0" stroke="#e6e4de"/>
<text x="347" y="170" text-anchor="middle" font-size="13" font-weight="500" fill="#262624">resolve_drift · setup</text>
<text x="347" y="187" text-anchor="middle" font-size="10.5" fill="#6b6a66">specs: git base ↔ working tree</text>
<text x="347" y="202" text-anchor="middle" font-size="10.5" fill="#6b6a66">index code → Qdrant · checkout -B branch</text>

<rect x="205" y="240" width="285" height="54" rx="8" fill="#eef2fb" stroke="#b9c9e8"/>
<text x="347" y="262" text-anchor="middle" font-size="13.5" font-weight="500" fill="#262624">parse</text>
<text x="347" y="279" text-anchor="middle" font-size="10.5" fill="#6b6a66">openapi before + after → schema_diff  (oasdiff)</text>

<rect x="205" y="330" width="285" height="54" rx="8" fill="#eef2fb" stroke="#b9c9e8"/>
<text x="347" y="352" text-anchor="middle" font-size="13.5" font-weight="500" fill="#262624">search</text>
<text x="347" y="369" text-anchor="middle" font-size="10.5" fill="#6b6a66">schema_diff → candidate_sites  (hybrid + RRF)</text>

<rect x="205" y="420" width="285" height="54" rx="8" fill="#eef2fb" stroke="#b9c9e8"/>
<text x="347" y="442" text-anchor="middle" font-size="13.5" font-weight="500" fill="#262624">refactor</text>
<text x="347" y="459" text-anchor="middle" font-size="10.5" fill="#6b6a66">sites + prev logs → SEARCH/REPLACE → patch</text>

<rect x="205" y="510" width="285" height="54" rx="8" fill="#eef2fb" stroke="#b9c9e8"/>
<text x="347" y="532" text-anchor="middle" font-size="13.5" font-weight="500" fill="#262624">verify</text>
<text x="347" y="549" text-anchor="middle" font-size="10.5" fill="#6b6a66">mypy + pytest exit codes → build_clean</text>

<polygon points="347,584 413,614 347,644 281,614" fill="#ffffff" stroke="#b3b1a8" stroke-width="1.5"/>
<text x="347" y="610" text-anchor="middle" font-size="11" font-weight="500" fill="#262624">build</text>
<text x="347" y="624" text-anchor="middle" font-size="11" font-weight="500" fill="#262624">clean?</text>

<rect x="205" y="672" width="285" height="56" rx="8" fill="#f5f4f0" stroke="#e6e4de"/>
<text x="347" y="693" text-anchor="middle" font-size="13" font-weight="500" fill="#262624">resolve_drift · finish</text>
<text x="347" y="710" text-anchor="middle" font-size="10.5" fill="#6b6a66">if healed: git diff → commit → push → gh pr create</text>

<rect x="205" y="746" width="285" height="54" rx="8" fill="#f5f4f0" stroke="#e6e4de"/>
<text x="347" y="767" text-anchor="middle" font-size="13" font-weight="500" fill="#262624">record_run</text>
<text x="347" y="784" text-anchor="middle" font-size="10.5" fill="#6b6a66">healed · iters · latency · tokens · recall · pr_url</text>

<line x1="347" y1="132" x2="347" y2="149" stroke="#b3b1a8" stroke-width="1.5" marker-end="url(#a)"/>
<line x1="347" y1="214" x2="347" y2="239" stroke="#b3b1a8" stroke-width="1.5" marker-end="url(#a)"/>
<line x1="347" y1="294" x2="347" y2="329" stroke="#b3b1a8" stroke-width="1.5" marker-end="url(#a)"/>
<line x1="347" y1="384" x2="347" y2="419" stroke="#b3b1a8" stroke-width="1.5" marker-end="url(#a)"/>
<line x1="347" y1="474" x2="347" y2="509" stroke="#b3b1a8" stroke-width="1.5" marker-end="url(#a)"/>
<line x1="347" y1="564" x2="347" y2="583" stroke="#b3b1a8" stroke-width="1.5" marker-end="url(#a)"/>
<line x1="347" y1="644" x2="347" y2="671" stroke="#3a7d54" stroke-width="1.5" marker-end="url(#ok)"/>
<line x1="347" y1="728" x2="347" y2="745" stroke="#b3b1a8" stroke-width="1.5" marker-end="url(#a)"/>

<text x="355" y="315" class="mono" font-size="9.5" fill="#9a9994">schema_diff</text>
<text x="355" y="405" class="mono" font-size="9.5" fill="#9a9994">candidate_sites[]</text>
<text x="355" y="495" class="mono" font-size="9.5" fill="#9a9994">patched + diff</text>
<text x="355" y="577" class="mono" font-size="9.5" fill="#9a9994">build_clean</text>
<text x="355" y="662" class="mono" font-size="9.5" fill="#3a7d54">✓ healed</text>

<polyline points="281,614 190,614 190,447 204,447" fill="none" stroke="#3f6cc4" stroke-width="1.5" marker-end="url(#ac)"/>
<text x="184" y="530" font-size="10" fill="#3f6cc4" transform="rotate(-90 184 530)">retry ≤ max · logs → prompt · iter++</text>

<path d="M652,309 L652,393 A100,9 0 0 0 852,393 L852,309" fill="#ffffff" stroke="#b3b1a8"/>
<ellipse cx="752" cy="309" rx="100" ry="9" fill="#ffffff" stroke="#b3b1a8"/>
<text x="752" y="332" text-anchor="middle" font-size="13" font-weight="500" fill="#262624">Qdrant</text>
<text x="752" y="350" text-anchor="middle" font-size="9.5" fill="#6b6a66">code_chunks · named dense + sparse vectors</text>
<text x="752" y="364" text-anchor="middle" font-size="9.5" fill="#6b6a66">payload { repo, path, symbol, code }</text>

<rect x="652" y="420" width="200" height="54" rx="8" fill="#f5f4f0" stroke="#e6e4de"/>
<text x="752" y="442" text-anchor="middle" font-size="12.5" font-weight="500" fill="#262624">LLM · DeepSeek / Ollama</text>
<text x="752" y="459" text-anchor="middle" font-size="9.5" fill="#6b6a66">OpenAI-compatible chat</text>

<rect x="652" y="510" width="200" height="54" rx="8" fill="#f5f4f0" stroke="#e6e4de"/>
