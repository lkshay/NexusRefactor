<text x="608" y="34" font-size="11" fill="#6b6a66">graph node</text>
<rect x="700" y="24" width="12" height="12" rx="3" fill="#f5f4f0" stroke="#e6e4de"/>
<text x="718" y="34" font-size="11" fill="#6b6a66">service step</text>
