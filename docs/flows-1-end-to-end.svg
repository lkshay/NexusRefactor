<svg viewBox="0 0 900 828" width="900" height="828" xmlns="http://www.w3.org/2000/svg" role="img">
<title>data and service flow: schema change to verified pull request</title>
<desc>A trigger (GitHub webhook with HMAC verification, or the nexus CLI) calls resolve_drift, which extracts the before and after OpenAPI specs from git, indexes the code into Qdrant, and checks out a fix branch, then invokes the LangGraph agent. The agent is a StateGraph over a shared RefactorState: parse turns the two specs into a schema_diff via oasdiff; search turns the diff into candidate_sites using hybrid retrieval plus RRF against Qdrant; refactor turns the sites plus any previous error logs into SEARCH/REPLACE edits applied to a working copy via the LLM; verify runs mypy and pytest in an isolated /tmp copy and sets build_clean from their exit codes. A gate loops back to refactor with the failure logs until build_clean is true or the iteration budget is exhausted. On success resolve_drift commits, pushes, and opens a pull request via gh, then record_run writes one metrics row to SQLite.</desc>
<style>
 text { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
 .serif { font-family: Georgia, 'Times New Roman', serif; }
 .mono { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; }
</style>
