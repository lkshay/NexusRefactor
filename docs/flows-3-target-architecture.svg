<text x="768" y="420" text-anchor="middle" font-size="9.5" fill="#3f6cc4">→ is the fleet actually good?</text>

<line x1="520" y1="282" x2="446" y2="354" stroke="#b3b1a8" stroke-width="1.4" marker-end="url(#a)"/>
