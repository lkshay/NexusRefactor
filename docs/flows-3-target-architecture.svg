<svg viewBox="0 0 960 470" width="960" height="470" xmlns="http://www.w3.org/2000/svg" role="img">
<title>target architecture: the whole system to explain</title>
<desc>A customer organization installs the GitHub App on its repos (payments-api, orders-svc, users-svc). When an OpenAPI spec changes, GitHub delivers a webhook and an App installation token to the agent service running on Fly.io — a FastAPI plus LangGraph heal loop, parse search refactor verify, gated by mypy and pytest. The agent uses a cloud Qdrant for retrieval and DeepSeek as the LLM, then opens a verified pull request back to the org repo for a human to review and merge. Observability has two layers: LangSmith captures per-run traces for debugging, and a separate online-eval dashboard tracks heal rate, cost per PR, and PR acceptance — the latter polled back from GitHub.</desc>
<style>
 text { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
 .serif { font-family: Georgia, 'Times New Roman', serif; }
 .mono { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; }
</style>
<defs>
 <marker id="a" markerWidth="8" markerHeight="8" refX="6.5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#b3b1a8"/></marker>
 <marker id="ok" markerWidth="8" markerHeight="8" refX="6.5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#3a7d54"/></marker>
