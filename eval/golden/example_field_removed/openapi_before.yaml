openapi: 3.0.3
info:
  title: Events API
  version: 1.0.0
paths:
  /events/{id}:
    get:
      operationId: getEvent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
components:
  schemas:
    Event:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        deprecated_tag:
          type: string
      required: [id, name]
